name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  conformance:
    name: Conformance Gates
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Gate §41.2 — Schema gate (tools/conformance/lint-schemas.mjs)
      - name: Schema lint
        run: npm run lint:schemas

      # Gate §41.1 / §41.7 — Typecheck (drift gate)
      - name: TypeScript typecheck
        run: npm run typecheck

      # Gate §41.3 — Runtime gate (reference cases)
      - name: Reference-case tests
        run: npm run test -- --coverage

      # Gate §41.2 additional — ESLint
      - name: Lint runtime source
        run: npm run lint

  build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    needs: conformance

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Compile TypeScript
        run: npm run build
